# =============================================================================
# NATS Surveyor — Prometheus metrics exporter for NATS
# Protected by oauth2-proxy (Keycloak SSO)
# Accessible externally via oauth2-proxy at /nats
#
# Requires NATS system account ($SYS) to be configured — see values.yaml
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nats-surveyor
  namespace: messaging
  labels:
    app.kubernetes.io/name: nats-surveyor
    app.kubernetes.io/component: observability
    app.kubernetes.io/part-of: digiorg-core-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: nats-surveyor
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nats-surveyor
        app.kubernetes.io/component: observability
    spec:
      # No initContainer — Kubernetes restart handles the NATS startup race.
      # Previous initContainers using nc/wget had DNS, TCP, and headless service issues.
      containers:
        - name: nats-surveyor
          image: natsio/nats-surveyor:latest
          args:
            - --servers
            - nats://nats.messaging.svc.cluster.local:4222
            - --user
            - sys
            - --password
            - sys_password
            - --port
            - "7777"
            - --count
            - "1"
          ports:
            - name: http
              containerPort: 7777
              protocol: TCP
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
          # Surveyor exposes only /metrics (Prometheus exporter)
          livenessProbe:
            httpGet:
              path: /metrics
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /metrics
              port: http
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: nats-surveyor
  namespace: messaging
  labels:
    app.kubernetes.io/name: nats-surveyor
    app.kubernetes.io/component: observability
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: nats-surveyor
  ports:
    - name: http
      port: 7777
      targetPort: http
