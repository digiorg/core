# =============================================================================
# oauth2-proxy — SSO gateway for NATS Surveyor UI
# Handles Keycloak OIDC authentication before forwarding to Surveyor
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nats-oauth2-proxy
  namespace: messaging
  labels:
    app.kubernetes.io/name: nats-oauth2-proxy
    app.kubernetes.io/component: auth-proxy
    app.kubernetes.io/part-of: digiorg-core-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: nats-oauth2-proxy
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nats-oauth2-proxy
        app.kubernetes.io/component: auth-proxy
    spec:
      containers:
        - name: oauth2-proxy
          image: quay.io/oauth2-proxy/oauth2-proxy:v7.6.0
          args:
            - --provider=oidc
            - --oidc-issuer-url=https://digiorg.local/keycloak/realms/digiorg-core-platform
            - --client-id=nats-surveyor
            - --redirect-url=https://digiorg.local/nats/oauth2/callback
            - --upstream=http://nats-surveyor.messaging.svc.cluster.local:7777
            - --http-address=0.0.0.0:4180
            # Sub-path prefix — oauth2-proxy runs at /nats, not /
            # Prevents redirect loop: callback path must be within proxy-prefix
            - --proxy-prefix=/nats/oauth2
            - --cookie-secure=true
            - --cookie-samesite=lax
            - --cookie-path=/nats
            - --email-domain=*
            - --skip-provider-button=true
            - --pass-access-token=false
            - --pass-authorization-header=false
            - --set-xauthrequest=false
            # Skip TLS verification for self-signed cert (local dev only)
            # Remove in production with trusted CA
            - --ssl-insecure-skip-verify=true
            - --oidc-extra-audience=nats-surveyor
            # Allow unverified emails for local dev (Keycloak test users)
            - --insecure-oidc-allow-unverified-email=true
          env:
            - name: OAUTH2_PROXY_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: nats-oauth2-proxy-secret
                  key: client-secret
            - name: OAUTH2_PROXY_COOKIE_SECRET
              valueFrom:
                secretKeyRef:
                  name: nats-oauth2-proxy-secret
                  key: cookie-secret
          ports:
            - name: http
              containerPort: 4180
              protocol: TCP
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: nats-oauth2-proxy
  namespace: messaging
  labels:
    app.kubernetes.io/name: nats-oauth2-proxy
    app.kubernetes.io/component: auth-proxy
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: nats-oauth2-proxy
  ports:
    - name: http
      port: 4180
      targetPort: http
