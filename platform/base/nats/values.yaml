# NATS Helm Values
# Chart: nats/nats
# https://github.com/nats-io/k8s/tree/main/helm/charts/nats

config:
  # Enable JetStream for persistent messaging
  jetstream:
    enabled: true
    fileStorage:
      enabled: true
      size: 1Gi
      storageDirectory: /data

  # Single-node for local dev (no clustering needed)
  cluster:
    enabled: false

  # NATS monitoring endpoint (used by Surveyor)
  monitor:
    port: 8222

  # System account required by NATS Surveyor for $SYS subject access
  # https://docs.nats.io/nats-server/configuration/sys_accounts
  merge:
    accounts:
      $SYS:
        users:
          - user: sys
            password: sys_password
      APP:
        jetstream: enabled
        users:
          - user: app

# Disable nats-box utility container (not needed)
natsBox:
  enabled: false

# Resource limits for the NATS container
# Use container.merge (not podTemplate.merge.spec.containers) to avoid
# generating a container entry without an image field (causes StatefulSet validation failure)
container:
  merge:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 500m
        memory: 256Mi

# Service configuration
service:
  ports:
    client:
      port: 4222
    monitor:
      port: 8222
    leafnode:
      enabled: false
    websocket:
      enabled: false
