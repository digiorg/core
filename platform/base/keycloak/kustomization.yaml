apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: keycloak

resources:
  - keycloak-deployment.yaml

configMapGenerator:
  - name: keycloak-realm-import
    files:
      - digiorg-core-platform-realm.json
      - digiorg-core-platform-users-0.json
    options:
      disableNameSuffixHash: true
