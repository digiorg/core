# =============================================================================
# Shared PostgreSQL — hosts keycloak and backstage databases
# Init script creates databases and users on first startup
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgresql-init-scripts
  namespace: platform-db
data:
  init.sh: |
    #!/bin/bash
    set -e

    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" <<-EOSQL
        CREATE USER keycloak WITH PASSWORD '${KEYCLOAK_DB_PASSWORD}';
        CREATE DATABASE keycloak OWNER keycloak;
        GRANT ALL PRIVILEGES ON DATABASE keycloak TO keycloak;

        CREATE USER backstage WITH PASSWORD '${BACKSTAGE_DB_PASSWORD}';
        CREATE DATABASE backstage OWNER backstage;
        GRANT ALL PRIVILEGES ON DATABASE backstage TO backstage;
    EOSQL

    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname keycloak <<-EOSQL
        GRANT ALL ON SCHEMA public TO keycloak;
    EOSQL

    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname backstage <<-EOSQL
        GRANT ALL ON SCHEMA public TO backstage;
    EOSQL
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgresql
  namespace: platform-db
spec:
  replicas: 1
  serviceName: postgresql
  selector:
    matchLabels:
      app: postgresql
  template:
    metadata:
      labels:
        app: postgresql
    spec:
      containers:
        - name: postgresql
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgresql-secrets
                  key: POSTGRES_PASSWORD
            - name: KEYCLOAK_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgresql-secrets
                  key: KEYCLOAK_DB_PASSWORD
            - name: BACKSTAGE_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgresql-secrets
                  key: BACKSTAGE_DB_PASSWORD
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
              subPath: data
            - name: init-scripts
              mountPath: /docker-entrypoint-initdb.d
              readOnly: true
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - postgres
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 6
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - postgres
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
      volumes:
        - name: init-scripts
          configMap:
            name: postgresql-init-scripts
            defaultMode: 0755
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 5Gi
