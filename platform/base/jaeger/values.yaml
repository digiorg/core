# Jaeger Helm Values — Jaeger v2 (chart 3.x)
# Docs: https://github.com/jaegertracing/jaeger/blob/main/cmd/jaeger/config.yaml
# Chart: https://github.com/jaegertracing/helm-charts/blob/main/charts/jaeger/values.yaml
#
# NOTE: Jaeger v2 uses the OpenTelemetry Collector framework.
# All Jaeger-specific config goes under `userconfig:` (OTEL Collector YAML).
# The old v1 schema (allInOne, collector, query, storage.type) does NOT exist in chart 3.x.

# Resource limits for the Jaeger pod
jaeger:
  # Inject OpenSearch admin password into Jaeger via environment variable.
  # The jaeger-opensearch-credentials secret is created by local-setup.nu.
  extraEnv:
    - name: OPENSEARCH_ADMIN_PASSWORD
      valueFrom:
        secretKeyRef:
          name: jaeger-opensearch-credentials
          key: password

  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  # Expose OTLP + Prometheus metrics ports via the service
  service:
    extraPorts:
      - name: otlp-grpc
        port: 4317
        targetPort: 4317
        protocol: TCP
      - name: otlp-http
        port: 4318
        targetPort: 4318
        protocol: TCP
      - name: metrics
        port: 8888
        targetPort: 8888
        protocol: TCP

# Jaeger v2 OTEL Collector config
# base_path: /jaeger is required for correct static asset routing behind NGINX subpath
userconfig:
  service:
    extensions: [jaeger_storage, jaeger_query, healthcheckv2]
    pipelines:
      traces:
        receivers: [otlp]
        exporters: [jaeger_storage_exporter]
    telemetry:
      resource:
        service.name: jaeger
      metrics:
        level: basic
        readers:
          - pull:
              exporter:
                prometheus:
                  host: 0.0.0.0
                  port: 8888

  extensions:
    healthcheckv2:
      use_v2: true
      http:
        endpoint: 0.0.0.0:14269

    jaeger_query:
      base_path: /jaeger
      storage:
        traces: primary_store

    jaeger_storage:
      backends:
        primary_store:
          elasticsearch:
            # OpenSearch is Elasticsearch 7.10.2 API-compatible — use elasticsearch backend type.
            # OpenSearch deployed in platform-db namespace (Wave 0, ready before Jaeger).
            server_urls: http://opensearch-cluster-master.platform-db.svc.cluster.local:9200
            index_prefix: jaeger
            # Credentials reference the jaeger-opensearch-credentials secret (created by local-setup.nu)
            username: admin
            password: "${OPENSEARCH_ADMIN_PASSWORD}"
            # Self-signed cert in local dev — disable host verification
            # Remove tls section in production and configure proper CA trust
            tls:
              skip_host_verify: true

  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

  exporters:
    jaeger_storage_exporter:
      trace_storage: primary_store

# Ingress managed via unified platform ingress (platform/base/ingress/digiorg-ingress.yaml)
ingress:
  enabled: false

# Disable Cassandra sub-chart — OpenSearch (platform-db) is the active storage backend.
# The chart 3.x default is provisionDataStore.cassandra: true which deploys an unused
# Cassandra StatefulSet. Explicitly disabled here.
provisionDataStore:
  cassandra: false
  elasticsearch: false
  kafka: false
