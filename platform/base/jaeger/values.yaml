# Jaeger Helm Values — Jaeger v2 (chart 4.x, OTEL Collector architecture)
# Docs: https://www.jaegertracing.io/docs/2.17/deployment/kubernetes/
# Chart: https://github.com/jaegertracing/helm-charts/tree/v2/charts/jaeger
# OpenSearch backend: https://www.jaegertracing.io/docs/2.17/storage/opensearch/
#
# NOTE: Chart 4.x uses `allInOne:` (not `jaeger:`) for the single-binary deployment.
# All pod-level settings (image, extraEnv, resources) must be under `allInOne:`.
# The full OTEL Collector config goes under `userconfig:`.

# =============================================================================
# Jaeger v2 All-in-One Deployment (Chart 4.x key: allInOne)
# =============================================================================
allInOne:
  enabled: true
  replicas: 1

  image:
    repository: jaegertracing/jaeger
    # Empty tag = Chart uses appVersion (2.17.0) as default.
    tag: ""
    pullPolicy: IfNotPresent

  # Inject OpenSearch admin password into Jaeger via environment variable.
  # The jaeger-opensearch-credentials secret is created by local-setup.nu.
  extraEnv:
    - name: OPENSEARCH_ADMIN_PASSWORD
      valueFrom:
        secretKeyRef:
          name: jaeger-opensearch-credentials
          key: password

  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

  # Chart 4.x allInOne service exposes OTLP (4317/4318) and Query UI (16686)
  # by default via the standard service definition. No extraPorts needed.

# =============================================================================
# Jaeger v2 OTEL Collector Configuration (userconfig)
# =============================================================================
# This is the full OTEL Collector config rendered into a ConfigMap and mounted
# into the Jaeger v2 pod. The single binary handles receiving, storage, and query.
#
# base_path: /jaeger is required for correct static asset routing behind NGINX subpath.
userconfig:
  service:
    extensions: [jaeger_storage, jaeger_query, healthcheckv2]
    pipelines:
      traces:
        receivers: [otlp]
        exporters: [jaeger_storage_exporter]
    telemetry:
      resource:
        service.name: jaeger
      metrics:
        level: basic
        readers:
          - pull:
              exporter:
                prometheus:
                  host: 0.0.0.0
                  port: 8888

  extensions:
    healthcheckv2:
      use_v2: true
      http:
        endpoint: 0.0.0.0:14269

    jaeger_query:
      base_path: /jaeger
      storage:
        traces: primary_store

    jaeger_storage:
      backends:
        primary_store:
          # Native OpenSearch backend (Jaeger v2) — preferred over elasticsearch
          # compatibility mode. Supports OpenSearch 1.x, 2.x, 3.x.
          # Ref: https://www.jaegertracing.io/docs/2.17/storage/opensearch/
          # Ref: https://github.com/jaegertracing/jaeger/blob/v2.17.0/cmd/jaeger/config-opensearch.yaml
          opensearch:
            # server_urls must be a list (not a single string)
            server_urls:
              - http://opensearch-cluster-master.platform-db.svc.cluster.local:9200
            indices:
              index_prefix: jaeger
              spans:
                date_layout: "2006-01-02"
                rollover_frequency: day
                shards: 5
                replicas: 0   # single-node dev cluster — no replicas
              services:
                date_layout: "2006-01-02"
                rollover_frequency: day
                shards: 5
                replicas: 0
              dependencies:
                date_layout: "2006-01-02"
                rollover_frequency: day
                shards: 5
                replicas: 0
            # Auth must be nested under auth.basic (Jaeger v2 / OTel strict-mode config schema).
            # username/password directly under opensearch: are NOT valid keys (see issue #94).
            # Uses ${env:...} OTel provider syntax for env var substitution.
            # The jaeger-opensearch-credentials secret is created by local-setup.nu.
            auth:
              basic:
                username: admin
                password: "${env:OPENSEARCH_ADMIN_PASSWORD}"
            # No tls: section needed — connection uses plain HTTP (http://)

  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

  exporters:
    jaeger_storage_exporter:
      trace_storage: primary_store

# =============================================================================
# Storage — ES Maintenance Jobs
# =============================================================================
# These settings configure es-index-cleaner, es-rollover, and spark jobs.
# In Jaeger v2, the primary storage config is in userconfig above.
# The storage section below is ONLY used by maintenance CronJobs.
storage:
  type: elasticsearch
  elasticsearch:
    tls:
      enabled: false
    url: http://opensearch-cluster-master.platform-db.svc.cluster.local:9200
    user: admin
    password: changeme  # Overridden at runtime via secret mount in maintenance jobs

# =============================================================================
# ES Index Cleaner — automatic index lifecycle (7-day retention)
# =============================================================================
esIndexCleaner:
  enabled: true
  image:
    repository: jaegertracing/jaeger-es-index-cleaner
    tag: "2.17.0"      # aligned with appVersion (was: 2.6.0)
    pullPolicy: IfNotPresent
  schedule: "55 23 * * *"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  numberOfDays: 7

# =============================================================================
# Disable unused sub-charts and maintenance jobs
# =============================================================================
esRollover:
  enabled: false

esLookback:
  enabled: false

spark:
  enabled: false

# =============================================================================
# Data Store Provisioning — all disabled (OpenSearch managed externally)
# =============================================================================
provisionDataStore:
  cassandra: false
  elasticsearch: false
  kafka: false

# =============================================================================
# Ingress — managed via unified platform ingress
# =============================================================================
ingress:
  enabled: false
