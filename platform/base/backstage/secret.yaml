apiVersion: v1
kind: Secret
metadata:
  name: backstage-secrets
  namespace: backstage
type: Opaque
stringData:
  # PostgreSQL password (local dev only)
  POSTGRES_PASSWORD: backstage-dev-password
  
  # Keycloak OIDC client secret (must match Keycloak client configuration)
  AUTH_OIDC_CLIENT_SECRET: backstage-client-secret
  
  # Session secret for OIDC authentication (required)
  # Generate with: openssl rand -base64 32
  AUTH_SESSION_SECRET: backstage-session-secret-change-in-prod
  
  # GitHub Personal Access Token (optional, for GitHub integrations)
  # Create one at: https://github.com/settings/tokens
  # Scopes needed: repo, read:org, read:user
  GITHUB_TOKEN: ""
