apiVersion: apps/v1
kind: Deployment
metadata:
  name: backstage
  namespace: backstage
spec:
  replicas: 1
  # Allow more time for image pull + startup on slow connections
  progressDeadlineSeconds: 900
  selector:
    matchLabels:
      app: backstage
  template:
    metadata:
      labels:
        app: backstage
    spec:
      # Wait for PostgreSQL to be ready before starting Backstage
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for PostgreSQL to be ready..."
              until nc -z postgresql.platform-db.svc.cluster.local 5432; do
                echo "PostgreSQL not ready yet, waiting..."
                sleep 2
              done
              echo "PostgreSQL is ready!"
      containers:
        - name: backstage
          image: ghcr.io/digiorg/core-backstage-image:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 7007
          env:
            # Application URLs
            - name: APP_BASE_URL
              value: "http://digiorg.local/backstage"
            - name: BACKEND_BASE_URL
              value: "http://digiorg.local/backstage"
            
            # PostgreSQL connection (using shared PostgreSQL in platform-db namespace)
            - name: POSTGRES_HOST
              value: postgresql.platform-db.svc.cluster.local
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_USER
              value: backstage
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: backstage-secrets
                  key: POSTGRES_PASSWORD
            
            # Session secret for OIDC auth
            - name: AUTH_SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: backstage-secrets
                  key: AUTH_SESSION_SECRET
            
            # Keycloak OIDC configuration
            - name: AUTH_OIDC_METADATA_URL
              value: "http://digiorg.local/keycloak/realms/digiorg-core-platform/.well-known/openid-configuration"
            - name: AUTH_OIDC_CLIENT_ID
              value: backstage
            - name: AUTH_OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: backstage-secrets
                  key: AUTH_OIDC_CLIENT_SECRET
            
            # GitHub integration (optional)
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: backstage-secrets
                  key: GITHUB_TOKEN
                  optional: true
          resources:
            requests:
              memory: "512Mi"
              cpu: "200m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          readinessProbe:
            httpGet:
              path: /.backstage/health/v1/readiness
              port: 7007
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /.backstage/health/v1/liveness
              port: 7007
            initialDelaySeconds: 120
            periodSeconds: 30
            failureThreshold: 5
