# =============================================================================
# Gitea Helm Chart Values
# Chart: https://gitea.com/gitea/helm-chart
# =============================================================================

replicaCount: 1

image:
  repository: gitea/gitea
  tag: ""  # Use chart default (latest stable)
  pullPolicy: IfNotPresent

# Disable built-in PostgreSQL — use shared platform-db instance
postgresql:
  enabled: false

# Disable built-in PostgreSQL HA
postgresql-ha:
  enabled: false

# Disable Redis cluster — use in-memory cache for local dev
redis-cluster:
  enabled: false

# Persistence for Git repositories
persistence:
  enabled: true
  size: 10Gi
  accessModes:
    - ReadWriteOnce

# Gitea configuration (app.ini)
gitea:
  admin:
    # Admin user created on first startup
    # Password from secret, username here for reference
    username: gitea_admin
    existingSecret: gitea-admin-secret
  
  # Environment variables injected into ALL containers (including init containers)
  # This is required for database password to be available during configure-gitea init
  # See: https://gitea.com/gitea/helm-gitea#user-defined-environment-variables-in-appini
  additionalConfigFromEnvs:
    - name: GITEA__database__PASSWD
      valueFrom:
        secretKeyRef:
          name: gitea-secrets
          key: POSTGRES_PASSWORD
  
  config:
    APP_NAME: "DigiOrg Git"
    
    server:
      DOMAIN: digiorg.local
      ROOT_URL: "https://digiorg.local/gitea/"
      SSH_DOMAIN: digiorg.local
      SSH_PORT: 22
      # Run behind reverse proxy with subpath
      PROTOCOL: http
      HTTP_PORT: 3000
      # Required for subpath deployment behind ingress
      SERVE_FROM_SUB_PATH: true
    
    database:
      DB_TYPE: postgres
      HOST: postgresql.platform-db.svc.cluster.local:5432
      NAME: gitea
      USER: gitea
      # Password injected via gitea.additionalConfigFromEnvs (GITEA__database__PASSWD)
      # This ensures the password is available in init containers for migrations
    
    security:
      INSTALL_LOCK: true
      SECRET_KEY: ""  # Auto-generated if empty
    
    service:
      # Disable local registration — users are created via Keycloak OIDC
      DISABLE_REGISTRATION: true
      ALLOW_ONLY_EXTERNAL_REGISTRATION: true
      SHOW_REGISTRATION_BUTTON: false
      ENABLE_NOTIFY_MAIL: false
    
    # Session configuration
    session:
      PROVIDER: memory
    
    # Cache configuration (use memory for local dev)
    cache:
      ADAPTER: memory
    
    # Queue configuration
    queue:
      TYPE: level
    
    # OAuth2 auto-registration
    oauth2_client:
      ENABLE_AUTO_REGISTRATION: true
      ACCOUNT_LINKING: login
      USERNAME: nickname
    
    # Enable Gitea Actions
    actions:
      ENABLED: true

# Note: Database password is injected via gitea.additionalConfigFromEnvs above,
# NOT via extraEnvVars. extraEnvVars only applies to the main container,
# but the configure-gitea init container needs the password for migrations.

# Ingress disabled — using platform-wide ingress
ingress:
  enabled: false

# Service configuration
service:
  http:
    type: ClusterIP
    port: 3000
  ssh:
    type: ClusterIP
    port: 22

# Resource limits
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

# Probes
livenessProbe:
  enabled: true
  initialDelaySeconds: 200
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 10

readinessProbe:
  enabled: true
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

# =============================================================================
# Self-signed CA trust for Keycloak OIDC (Ref: Issue #72)
# =============================================================================
# The platform uses a self-signed CA (cert-manager) for TLS. Gitea must trust
# this CA to connect to Keycloak's OIDC discovery endpoint via HTTPS.
#
# The CA cert is provided via ConfigMap 'gitea-ca-cert' (created by local-setup.nu
# from the cert-manager CA secret). The initPreScript copies it into the system
# trust store before Gitea starts, so both the server and CLI commands (e.g.
# 'gitea admin auth add-oauth') can verify Keycloak's TLS certificate.
# =============================================================================

# Mount the platform CA certificate into the container
extraVolumes:
  - name: platform-ca-cert
    configMap:
      name: gitea-ca-cert

extraVolumeMounts:
  - name: platform-ca-cert
    mountPath: /extra-certs
    readOnly: true

# initPreScript runs in the init-app-ini init container before Gitea starts.
# This ensures the CA is in the trust store when any Go process loads x509.SystemCertPool().
initPreScript: |
  if [ -f /extra-certs/digiorg-local-ca.crt ]; then
    cp /extra-certs/digiorg-local-ca.crt /usr/local/share/ca-certificates/digiorg-local-ca.crt
    update-ca-certificates
    echo "[init] Platform CA certificate installed into trust store"
  fi

# Note: Custom initContainers removed.
# The Gitea Helm chart has built-in init containers (init-directories, init-app-ini, configure-gitea)
# that handle initialization. PostgreSQL readiness is ensured by ArgoCD sync waves:
# - Wave 0: PostgreSQL (deployed first)
# - Wave 2: Gitea (deployed after PostgreSQL is healthy)
#
# The Gitea chart's initContainers key expects a map for configuring built-in
# init containers (resources, securityContext), not an array of custom containers.
