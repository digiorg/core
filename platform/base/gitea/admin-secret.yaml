# =============================================================================
# Gitea Admin User Secret
# This secret is created by the setup script with a generated password
# For local development, we use a placeholder that gets overwritten
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: gitea-admin-secret
  namespace: gitea
type: Opaque
stringData:
  # Note: This is a placeholder for ArgoCD sync
  # The actual admin credentials are set via Gitea's first-run setup
  # or overridden by the setup script
  username: gitea_admin
  password: "change-me-on-first-login"
