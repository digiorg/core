apiVersion: apps/v1
kind: Deployment
metadata:
  name: landingpage
  namespace: platform-apps
  labels:
    app.kubernetes.io/name: landingpage
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: digiorg-core-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: landingpage
  template:
    metadata:
      labels:
        app.kubernetes.io/name: landingpage
        app.kubernetes.io/component: frontend
    spec:
      containers:
        - name: landingpage
          image: ghcr.io/digiorg/core-landingpage:main
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /usr/share/nginx/html/config.js
              subPath: config.js
            - name: services
              mountPath: /usr/share/nginx/html/services.json
              subPath: services.json
          resources:
            requests:
              memory: "32Mi"
              cpu: "10m"
            limits:
              memory: "64Mi"
              cpu: "100m"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            runAsUser: 101
            capabilities:
              drop:
                - ALL
      volumes:
        - name: config
          configMap:
            name: landingpage-config
        - name: services
          configMap:
            name: landingpage-services
      securityContext:
        fsGroup: 101
