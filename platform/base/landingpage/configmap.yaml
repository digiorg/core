apiVersion: v1
kind: ConfigMap
metadata:
  name: landingpage-config
  namespace: platform-apps
  labels:
    app.kubernetes.io/name: landingpage
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: digiorg-core-platform
data:
  config.js: |
    /**
     * DigiOrg Platform Runtime Configuration
     * Generated by platform deployment
     */
    window.__DIGIORG_CONFIG__ = {
      baseUrl: "https://digiorg.local",
      keycloak: {
        url: "https://digiorg.local/keycloak",
        realm: "digiorg-core-platform",
        clientId: "landingpage"
      },
      servicesEndpoint: "/api/services"
    };
