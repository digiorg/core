apiVersion: v1
kind: ConfigMap
metadata:
  name: landingpage-services
  namespace: platform-apps
  labels:
    app.kubernetes.io/name: landingpage
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: digiorg-core-platform
data:
  services.json: |
    [
      {
        "id": "keycloak",
        "name": "Identities & Access",
        "description": "Authentication and authorization",
        "path": "/keycloak",
        "icon": "key",
        "category": "security",
        "requiresAuth": false,
        "displayOrder": 1
      },
      {
        "id": "backstage",
        "name": "Components & Catalog",
        "description": "Service catalog and documentation",
        "path": "/backstage",
        "icon": "code",
        "category": "developer",
        "requiresAuth": true,
        "displayOrder": 2
      },
      {
        "id": "gitea",
        "name": "Repositories & Pipelines",
        "description": "Git repositories and code review",
        "path": "/gitea",
        "icon": "git",
        "category": "developer",
        "requiresAuth": true,
        "displayOrder": 3
      },
      {
        "id": "argocd",
        "name": "GitOps & Deployment",
        "description": "Continuous delivery and deployments",
        "path": "/argocd",
        "icon": "rocket",
        "category": "deployment",
        "requiresAuth": true,
        "displayOrder": 4
      },
      {
        "id": "grafana",
        "name": "Logging & Monitoring",
        "description": "Metrics and dashboards",
        "path": "/grafana",
        "icon": "chart",
        "category": "monitoring",
        "requiresAuth": true,
        "displayOrder": 5
      },
      {
        "id": "jaeger",
        "name": "Tracing & Observing",
        "description": "Distributed Tracing & Observing",
        "path": "/jaeger",
        "icon": "tracing",
        "category": "observability",
        "requiresAuth": true,
        "displayOrder": 6
      }
    ]
