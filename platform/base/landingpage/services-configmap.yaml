apiVersion: v1
kind: ConfigMap
metadata:
  name: landingpage-services
  namespace: platform-apps
  labels:
    app.kubernetes.io/name: landingpage
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: digiorg-core-platform
data:
  services.json: |
    [
      {
        "id": "keycloak",
        "name": "Keycloak",
        "description": "Identity & Access Management",
        "path": "/keycloak",
        "icon": "key",
        "category": "security",
        "requiresAuth": false
      },
      {
        "id": "argocd",
        "name": "Argo CD",
        "description": "GitOps Continuous Delivery",
        "path": "/argocd",
        "icon": "git-branch",
        "category": "deployment",
        "requiresAuth": true
      },
      {
        "id": "grafana",
        "name": "Grafana",
        "description": "Observability & Dashboards",
        "path": "/grafana",
        "icon": "chart",
        "category": "monitoring",
        "requiresAuth": true
      },
      {
        "id": "backstage",
        "name": "Backstage",
        "description": "Developer Portal",
        "path": "/backstage",
        "icon": "code",
        "category": "developer",
        "requiresAuth": false
      },
      {
        "id": "gitea",
        "name": "Gitea",
        "description": "Git Repository Service",
        "path": "/gitea",
        "icon": "git",
        "category": "developer",
        "requiresAuth": false
      }
    ]
