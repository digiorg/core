# =============================================================================
# DigiOrg Unified Ingress — Path-based routing for all platform services
# =============================================================================
# All services accessible via: https://digiorg.local/<service>
#
# Prerequisites:
# 1. NGINX Ingress Controller installed
# 2. cert-manager installed with digiorg-local-ca-issuer configured
# 3. Add to /etc/hosts: 127.0.0.1 digiorg.local
# 4. Import CA cert into OS trust store (see platform/base/cert-manager/README.md)
# 5. KinD cluster with ports 80+443 mapped to ingress controller
#
# Services:
# - https://digiorg.local/           → Landing Page (entry point)
# - https://digiorg.local/keycloak   → Keycloak IdP
# - https://digiorg.local/argocd     → ArgoCD GitOps
# - https://digiorg.local/grafana    → Grafana Monitoring
# - https://digiorg.local/backstage  → Backstage Developer Portal
# - https://digiorg.local/gitea      → Gitea Git Service
# - https://digiorg.local/jaeger     → Jaeger Distributed Tracing
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: digiorg-platform
  namespace: ingress-nginx
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/proxy-buffer-size: "128k"
    nginx.ingress.kubernetes.io/proxy-buffers-number: "4"
    # TLS: cert-manager provisions and renews the certificate automatically
    # Switch issuer for staging/prod: letsencrypt-staging or letsencrypt-prod
    cert-manager.io/cluster-issuer: "digiorg-local-ca-issuer"
    # Redirect all HTTP traffic to HTTPS
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - digiorg.local
      secretName: digiorg-local-tls
  rules:
    - host: digiorg.local
      http:
        paths:
          # Keycloak IdP
          - path: /keycloak(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: keycloak
                port:
                  number: 8080
          # ArgoCD
          - path: /argocd(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: argocd-server
                port:
                  number: 80
          # Grafana
          - path: /grafana(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: prometheus-grafana
                port:
                  number: 80
          # Jaeger Distributed Tracing
          - path: /jaeger(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: jaeger-query
                port:
                  number: 16686
          # Landing Page (root path - must be last due to catch-all)
          - path: /
            pathType: Prefix
            backend:
              service:
                name: landingpage
                port:
                  number: 8080
---
# Backstage needs URL rewriting because it doesn't natively support subpath deployment
# /backstage/foo -> /foo on the backend
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: backstage-ingress
  namespace: ingress-nginx
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/proxy-buffer-size: "128k"
    cert-manager.io/cluster-issuer: "digiorg-local-ca-issuer"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - digiorg.local
      secretName: digiorg-local-tls
  rules:
    - host: digiorg.local
      http:
        paths:
          - path: /backstage(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: backstage
                port:
                  number: 7007
---
# Gitea needs URL rewriting for subpath deployment
# /gitea/foo -> /foo on the backend
# See: https://docs.gitea.com/administration/reverse-proxies#use-a-sub-path
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gitea-ingress
  namespace: ingress-nginx
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/proxy-buffer-size: "128k"
    nginx.ingress.kubernetes.io/proxy-body-size: "512m"  # Large Git pushes
    cert-manager.io/cluster-issuer: "digiorg-local-ca-issuer"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - digiorg.local
      secretName: digiorg-local-tls
  rules:
    - host: digiorg.local
      http:
        paths:
          - path: /gitea(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: gitea-http
                port:
                  number: 3000

---
# ExternalName services to route cross-namespace
apiVersion: v1
kind: Service
metadata:
  name: keycloak
  namespace: ingress-nginx
spec:
  type: ExternalName
  externalName: keycloak.keycloak.svc.cluster.local
  ports:
    - port: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: argocd-server
  namespace: ingress-nginx
spec:
  type: ExternalName
  externalName: argocd-server.argocd.svc.cluster.local
  ports:
    - port: 80
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus-grafana
  namespace: ingress-nginx
spec:
  type: ExternalName
  externalName: prometheus-grafana.monitoring.svc.cluster.local
  ports:
    - port: 80
---
apiVersion: v1
kind: Service
metadata:
  name: backstage
  namespace: ingress-nginx
spec:
  type: ExternalName
  externalName: backstage.backstage.svc.cluster.local
  ports:
    - port: 7007
---
apiVersion: v1
kind: Service
metadata:
  name: gitea-http
  namespace: ingress-nginx
spec:
  type: ExternalName
  externalName: gitea-http.gitea.svc.cluster.local
  ports:
    - port: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: jaeger-query
  namespace: ingress-nginx
spec:
  type: ExternalName
  externalName: jaeger-query.tracing.svc.cluster.local
  ports:
    - port: 16686
---
apiVersion: v1
kind: Service
metadata:
  name: landingpage
  namespace: ingress-nginx
spec:
  type: ExternalName
  externalName: landingpage.platform-apps.svc.cluster.local
  ports:
    - port: 8080

