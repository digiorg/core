apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    # Wave 1: Self-managed ArgoCD - takes over from initial Helm installation
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default

  source:
    repoURL: git@github.com:digiorg/core.git
    targetRevision: HEAD
    path: platform/base/argocd

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
