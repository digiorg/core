apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: crossplane
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    # Wave 3: Extensions - no dependencies on other platform services
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: default

  source:
    repoURL: https://charts.crossplane.io/stable
    chart: crossplane
    targetRevision: 1.19.0
    helm:
      releaseName: crossplane
      values: |
        # Crossplane Helm values for local development
        replicas: 1
        resourcesCrossplane:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 512Mi
        resourcesRBACManager:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 100m
            memory: 256Mi

  destination:
    server: https://kubernetes.default.svc
    namespace: crossplane-system

  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
